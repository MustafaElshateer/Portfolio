@if (ready()) {
  <main class="portal-page">
    <section class="portal-shell">
      <header class="portal-header">
        <button
          type="button"
          class="language-switch"
          (click)="onToggleLanguage()"
          [attr.aria-label]="translate('actions.switchLanguage')"
        >
          <span class="language-switch__badge">
            <!-- <span class="language-switch__text">
              {{ isArabic() ? 'عربي' : 'English' }}
            </span> -->

            <img
              class="language-switch__icon"
              [src]="
                isArabic()
                  ? 'assets/images/PortalAssets/SVG/ar.svg'
                  : 'assets/images/PortalAssets/SVG/en.svg'
              "
              [alt]="isArabic() ? 'Arabic' : 'English'"
            />
          </span>
        </button>

        <a class="portal-logo" href="#" aria-label="Tanmeyah logo">
          <img src="assets/images/PortalAssets/SVG/Group15.svg" alt="Tanmeyah logo" />
        </a>
      </header>

      <section class="portal-content" [attr.aria-label]="translate('portal.title')">
        <div class="portal-grid">
          @for (item of items; track trackById($index, item)) {
            <a
              class="portal-card"
              [href]="item.url"
              [target]="item.external ? '_blank' : '_self'"
              rel="noopener noreferrer"
              [attr.aria-label]="ariaLabel(item)"
            >
              <div class="portal-card__box">
                <div
                  class="portal-card__circle"
                  [class.portal-card__circle--blue]="item.color === 'blue'"
                >
                  @if (item.iconType === 'img' && item.iconSrc) {
                    <img
                      class="portal-card__image-icon"
                      [src]="item.iconSrc"
                      [alt]="translate(item.labelKey)"
                    />
                  } @else {
                    <div class="portal-card__inline-icon" [ngSwitch]="item.iconName">
                      <!-- email -->
                      <svg
                        *ngSwitchCase="'email'"
                        xmlns="http://www.w3.org/2000/svg"
                        width="26"
                        height="26"
                        viewBox="0 0 24 24"
                        fill="none"
                      >
                        <g>
                          <path
                            d="M17 3.5H7C4 3.5 2 5 2 8.5V15.5C2 19 4 20.5 7 20.5H17C20 20.5 22 19 22 15.5V8.5C22 5 20 3.5 17 3.5ZM17.47 9.59L14.34 12.09C13.68 12.62 12.84 12.88 12 12.88C11.16 12.88 10.31 12.62 9.66 12.09L6.53 9.59C6.21 9.33 6.16 8.85 6.41 8.53C6.67 8.21 7.14 8.15 7.46 8.41L10.59 10.91C11.35 11.52 12.64 11.52 13.4 10.91L16.53 8.41C16.85 8.15 17.33 8.2 17.58 8.53C17.84 8.85 17.79 9.33 17.47 9.59Z"
                            fill="#EF3C3B"
                          />
                        </g>
                      </svg>

                      <!-- document -->
                      <svg
                        *ngSwitchCase="'document'"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                      >
                        <path
                          d="M1.12.195A.654.654,0,0,0,0,.635v3.49a2.726,2.726,0,0,0,2.75,2.67c.95.01,2.27.01,3.4.01a.631.631,0,0,0,.47-1.07C5.18,4.285,2.6,1.675,1.12.195Z"
                          transform="translate(14.68 2.015)"
                          fill="#EF3C3B"
                        />

                      <!-- calendar -->
                      <svg

                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"

                      <!-- checklist -->
                      <svg
                        *ngSwitchCase="'checklist'"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"

                      <!-- briefcase -->
                      <svg
                        *ngSwitchCase="'briefcase'"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"

                          transform="translate(2.34 13.343)"
                          fill="#EF3C3B"
                        />
                      </svg>

                      <!-- loan -->
                      <svg
                        *ngSwitchCase="'loan'"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                      >
                        <path
                          d="M12.92,6.5A6.5,6.5,0,0,1,7.4,12.92v-.06A8.064,8.064,0,0,0,.03,5.52H0a6.5,6.5,0,0,1,12.92.98Z"
                          transform="translate(9.08 2)"

                        <path

                          fill="#EF3C3B"

                      <!-- key -->
                      <svg
                        *ngSwitchCase="'key'"
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                      >

                      <!-- fmc -->

              <span

    </section>
  </main>
}
